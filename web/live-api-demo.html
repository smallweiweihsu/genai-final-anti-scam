<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 釣魚信件辨識｜Live API Demo</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #071018;
      color: #e8f4ff;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 36px 20px;
    }
    .hero {
      padding: 32px;
      border: 1px solid #1f3a4a;
      border-radius: 24px;
      background: #0b1a24;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.05;
      margin: 0 0 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      border: 1px solid #1f3a4a;
      border-radius: 18px;
      background: #0b1620;
      padding: 20px;
    }
    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #9db7c8;
      font-weight: 700;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #29495a;
      border-radius: 10px;
      background: #071018;
      color: #e8f4ff;
      padding: 12px;
      font-size: 15px;
    }
    textarea {
      min-height: 220px;
      resize: vertical;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      margin-top: 14px;
      background: linear-gradient(90deg, #42d9f5, #72f0a6);
      color: #061018;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: #142431;
      color: #e8f4ff;
      border: 1px solid #29495a;
      margin-left: 8px;
    }
    code, pre {
      color: #6ee7ff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border: 1px solid #2b5b6d;
      border-radius: 999px;
      margin: 4px 6px 4px 0;
      color: #b9ecff;
    }
    .risk-high {
      border-color: rgba(255, 104, 116, 0.8);
      background: rgba(255, 104, 116, 0.16);
    }
    .risk-medium {
      border-color: rgba(245, 196, 81, 0.8);
      background: rgba(245, 196, 81, 0.16);
    }
    .risk-low {
      border-color: rgba(100, 230, 160, 0.8);
      background: rgba(100, 230, 160, 0.16);
    }
    .muted { color: #9db7c8; }
    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .api-row input { flex: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="muted">AI 釣魚信件辨識｜公開 Flask API Demo</p>
      <h1>把可疑信件送進模型，即時看見風險判斷。</h1>
      <p class="muted">此頁呼叫 Render 上的 Flask 後端，不需要本機開啟終端機。</p>

      <label for="apiBaseUrlInput">API URL</label>
      <div class="api-row">
        <input id="apiBaseUrlInput" type="text" />
        <button id="saveApiBaseUrlBtn" type="button">儲存 API URL</button>
        <button id="resetApiBaseUrlBtn" class="secondary" type="button">恢復預設</button>
      </div>
      <p class="muted">目前 endpoint：<code id="currentApiEndpoint"></code></p>
      <p id="apiStatus" class="muted"></p>
    </section>

    <main class="grid">
      <section class="card">
        <h2>信件內容</h2>

        <label for="subjectInput">信件主旨</label>
        <input id="subjectInput" value="您的帳戶將於 24 小時內停用，請立即完成驗證" />

        <label for="senderInput">寄件者</label>
        <input id="senderInput" value="security-alert@paypal-login.example" />

        <label for="bodyInput">信件內容</label>
        <textarea id="bodyInput">親愛的用戶您好：

我們偵測到您的帳戶登入異常。為避免帳戶停用，請於 24 小時內點擊以下連結重新驗證您的帳號與密碼。

https://paypal-login.example/verify

若未完成驗證，您的帳戶將會被暫停。</textarea>

        <button id="analyzeBtn" type="button">開始分析</button>
        <button id="clearBtn" class="secondary" type="button">清除結果</button>
      </section>

      <section class="card">
        <h2>分析結果</h2>
        <div id="resultBox" class="muted">尚未送出分析。</div>
      </section>
    </main>
  </div>

  <script>
    const DEFAULT_API_BASE_URL = "https://genai-final-anti-scam.onrender.com";
    const LOCAL_STORAGE_KEY = "ANTI_SCAM_API_BASE_URL";

    const $ = (id) => document.getElementById(id);

    function normalizeApiBaseUrl(value) {
      return String(value || "").trim().replace(/\/+$/, "");
    }

    function getApiBaseUrl() {
      const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
      return normalizeApiBaseUrl(saved || DEFAULT_API_BASE_URL);
    }

    function getAnalyzeApiUrl() {
      return `${getApiBaseUrl()}/api/analyze-email`;
    }

    function updateEndpointDisplay(message = "") {
      $("apiBaseUrlInput").value = getApiBaseUrl();
      $("currentApiEndpoint").textContent = getAnalyzeApiUrl();
      $("apiStatus").textContent = message;
    }

    function list(items) {
      if (!items || !items.length) return "<span class='muted'>無</span>";
      return items.map((x) => `<span class="pill">${escapeHtml(String(x))}</span>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderResult(data) {
      const risk = data.risk_level || "medium";
      const boxClass = risk === "high" ? "risk-high" : risk === "low" ? "risk-low" : "risk-medium";

      $("resultBox").innerHTML = `
        <div class="${boxClass}" style="padding:16px;border-radius:14px;border-width:1px;border-style:solid;">
          <p class="muted">風險等級</p>
          <h2>${escapeHtml(data.risk_level_zh || data.risk_level || "未知")}</h2>
          <p>${escapeHtml(data.explanation_for_general_users || "")}</p>
        </div>

        <h3>模型原始判斷</h3>
        <p>label：<code>${escapeHtml(data.label)}</code></p>
        <p>phishing_probability：<code>${escapeHtml(data.phishing_probability)}</code></p>
        <p>confidence_score：<code>${escapeHtml(data.confidence_score)}</code></p>

        <h3>最終使用者風險</h3>
        <p>risk_score：<code>${escapeHtml(data.risk_score)}</code></p>

        <h3>可疑特徵</h3>
        ${list(data.indicators)}

        <h3>詐騙話術</h3>
        ${list(data.manipulation_methods)}

        <h3>個資風險</h3>
        <p>${escapeHtml(data.personal_data_risk || "")}</p>

        <h3>付款風險</h3>
        <p>${escapeHtml(data.payment_risk || "")}</p>

        <h3>安全行動</h3>
        ${list(data.safe_actions)}

        <h3>網域與後處理</h3>
        <p>sender_domain：<code>${escapeHtml(data.sender_domain || "")}</code></p>
        <p>url_domains：${list(data.url_domains)}</p>
        <p>matched_official_domains：${list(data.matched_official_domains)}</p>
        <p>matched_trusted_domains：${list(data.matched_trusted_domains)}</p>
        <p>domain_mismatch：<code>${escapeHtml(data.domain_mismatch)}</code></p>
        <p>postprocess_notes：${list(data.postprocess_notes)}</p>

        <h3>原始 JSON</h3>
        <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
      `;
    }

    async function analyzeEmail() {
      $("resultBox").innerHTML = "<span class='muted'>分析中，Render 免費方案冷啟動可能需要等待。</span>";

      const payload = {
        subject: $("subjectInput").value,
        sender: $("senderInput").value,
        body: $("bodyInput").value
      };

      try {
        const response = await fetch(getAnalyzeApiUrl(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const text = await response.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(text || "API 回傳不是 JSON");
        }

        if (!response.ok) {
          throw new Error(data.error || data.model_error || `HTTP ${response.status}`);
        }

        renderResult(data);
      } catch (error) {
        $("resultBox").innerHTML = `
          <div class="risk-high" style="padding:16px;border-radius:14px;border-width:1px;border-style:solid;">
            <h3>無法連接模型 API</h3>
            <p>請確認 API URL 是否正確，或 Render 後端是否仍在冷啟動。</p>
            <p><code>${escapeHtml(error.message)}</code></p>
          </div>
        `;
      }
    }

    $("saveApiBaseUrlBtn").addEventListener("click", () => {
      const normalized = normalizeApiBaseUrl($("apiBaseUrlInput").value);
      localStorage.setItem(LOCAL_STORAGE_KEY, normalized);
      updateEndpointDisplay("API URL 已儲存");
    });

    $("resetApiBaseUrlBtn").addEventListener("click", () => {
      localStorage.removeItem(LOCAL_STORAGE_KEY);
      updateEndpointDisplay("已恢復預設 API URL");
    });

    $("analyzeBtn").addEventListener("click", analyzeEmail);
    $("clearBtn").addEventListener("click", () => {
      $("resultBox").textContent = "尚未送出分析。";
    });

    updateEndpointDisplay();
  </script>
</body>
</html>
